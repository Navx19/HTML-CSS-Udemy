<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML & CSS Sandbox</title>
  </head>
  <body>
    <h1>HTML & CSS Sandbox - Images</h1>

    <h2>Image With a Relative Path</h2>
    <img src="picture/images.jpg" alt="Food" />

    <h2>Image With a Figure and Figcaption</h2>
    <figure>
      <img
        src="picture/images.jpg"
        alt="food"
        height="300"
        width="400"
      />

      <figcaption>This is a food image.</figcaption>
    </figure>
  </body>
</html>
