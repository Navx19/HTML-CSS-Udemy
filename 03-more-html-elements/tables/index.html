    <title>HTML & CSS - Sandbox</title>
</head>
<body>
    <h1>HTML & CSS  Sandbox - Tables</h1>
    <table>
        <colgroup>
            <col style="width: 25%; background-color: beige;">
            <col style="width: 25%; background-color: honeydew;">
            <col style="width: 25%; background-color: beige;">
            <col style="width: 25%; background-color: honeydew;">
        </colgroup>
        <thead>
            <tr>
                <th>First Name</th>
                <th>Last Name</th>
                <th>Age</th>
                <th colspan="2">Telephone Numbers</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Nava</td>
                <td>Nur</td>
                <td>23</td>
                <td>7857212</td>
                
            </tr>
            <tr>
                <td>Sanim</td>
                <td>Ahmed</td>
                <td>24</td>
                <td>679212</td>
                
            </tr>
        </tbody>
        
    </table>
</body>
</html>
