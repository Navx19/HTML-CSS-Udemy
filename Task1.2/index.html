<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bento Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Gallery</h2>

    <div class="gallery">

        <img src="https://picsum.photos/600/600?random=1"
             class="item item1" alt="1">

        <img src="https://picsum.photos/600/600?random=2"
             class="item item2" alt="2">

        <img src="https://picsum.photos/600/600?random=3"
             class="item item3" alt="3">

        <img src="https://picsum.photos/600/600?random=4"
             class="item item4" alt="4">

        <img src="https://picsum.photos/600/600?random=5"
             class="item item5" alt="5">

        <img src="https://picsum.photos/600/600?random=6"
             class="item item6" alt="6">

    </div>
</div>

</body>
</html>
